      { id:'managerApproval',  icon:'fa-solid fa-file-invoice-dollar', label:'อนุมัติงบประมาณ',         roles:['Super Admin','Manager'] },
      { id:'users',            icon:'fa-solid fa-users',               label:'จัดการผู้ใช้งาน',         roles:['Super Admin'] },
      { id:'settings',         icon:'fa-solid fa-gear',                label:'ตั้งค่าระบบ',             roles:['Super Admin'] },
    ];

    // ==========================================
    // 🛠 Utilities
    // ==========================================
    const getStatusStyle = (status) => {
      const map = {
        'เสร็จสิ้น':            'bg-emerald-100 text-emerald-700 border-emerald-200',
        'อนุมัติแล้ว':           'bg-emerald-100 text-emerald-700 border-emerald-200',
        'กำลังดำเนินการ':        'bg-blue-100 text-blue-700 border-blue-200',
        'รออนุมัติ QA':          'bg-amber-100 text-amber-700 border-amber-200',
        'รออนุมัติ ผอ.':         'bg-purple-100 text-purple-700 border-purple-200',
        'รออนุมัติ (Manager)':   'bg-orange-100 text-orange-700 border-orange-200',
        'รอตรวจสอบ':             'bg-amber-100 text-amber-700 border-amber-200',
        'ตีกลับ':                'bg-rose-100 text-rose-700 border-rose-200',
        'ไม่อนุมัติ':            'bg-rose-100 text-rose-700 border-rose-200',
      };
      return map[status] || 'bg-slate-100 text-slate-600 border-slate-200';
    };

    const fmtCurrency = (v) => '฿' + Number(v||0).toLocaleString('th-TH');
    const genId = () => 'ACT-' + Date.now().toString(36).toUpperCase();

    // ==========================================
    // 🍞 Toast Component
    // ==========================================
    function Toast({ message, type, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
      const icons = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
      return (
        <div className={`toast toast-${type}`}>
          <i className={`fa-solid ${icons[type]}`}></i>
          <span>{message}</span>
          <button onClick={onClose} className="ml-2 opacity-50 hover:opacity-100"><i className="fa-solid fa-xmark text-xs"></i></button>
        </div>
      );
    }

    // ==========================================
    // 📊 Stat Card
    // ==========================================
    function StatCard({ title, value, sub, colorClass, icon }) {
      return (
        <div className="bg-white p-6 rounded-2xl shadow-soft border border-slate-100 hover:-translate-y-1 hover:shadow-lg transition-all duration-300 group">
          <div className="flex items-start justify-between">
            <div>
              <p className="text-xs text-slate-400 font-medium mb-1 uppercase tracking-wider">{title}</p>
              <p className="text-2xl font-bold text-slate-800">{value}</p>
              {sub && <p className="text-xs text-slate-400 mt-1">{sub}</p>}
            </div>
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${colorClass}`}>
              <i className={`${icon} text-xl`}></i>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 🔴 Modal Confirm
    // ==========================================
    function ConfirmModal({ title, message, onConfirm, onCancel, confirmLabel='ยืนยัน', confirmClass='bg-rose-500 hover:bg-rose-600' }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" onClick={onCancel}>
          <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 animate-fadeInUp" onClick={e=>e.stopPropagation()}>
            <h3 className="text-lg font-bold text-slate-800 mb-2">{title}</h3>
            <p className="text-sm text-slate-500 mb-6 leading-relaxed">{message}</p>
            <div className="flex justify-end gap-3">
              <button onClick={onCancel} className="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100 font-semibold text-sm transition">ยกเลิก</button>
              <button onClick={onConfirm} className={`px-5 py-2.5 rounded-xl text-white font-semibold text-sm transition ${confirmClass}`}>{confirmLabel}</button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 🔵 Activity Detail Modal
    // ==========================================
    function ActivityDetailModal({ act, onClose }) {
      if (!act) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full mx-4 animate-fadeInUp" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-start mb-6">
              <div>
                <span className="text-xs text-slate-400 font-mono">{act.id}</span>
                <h3 className="text-lg font-bold text-slate-800 mt-1">{act.name}</h3>
              </div>
              <button onClick={onClose} className="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-400"><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="space-y-3 text-sm">
              <div className="flex justify-between py-2 border-b border-slate-100">
                <span className="text-slate-500">โครงการหลัก</span>
                <span className="font-semibold text-slate-800 text-right max-w-xs">{act.project}</span>
              </div>
              <div className="flex justify-between py-2 border-b border-slate-100">
                <span className="text-slate-500">งบประมาณ</span>
                <span className="font-bold text-brand-primary">{fmtCurrency(act.budget)}</span>
              </div>
              <div className="flex justify-between py-2 border-b border-slate-100">
                <span className="text-slate-500">สถานะ</span>
                <span className={`px-3 py-1 rounded-full text-xs font-bold border ${getStatusStyle(act.status)}`}>{act.status}</span>
              </div>
              <div className="flex justify-between py-2 border-b border-slate-100">
                <span className="text-slate-500">PDCA</span>
                <span className="bg-slate-800 text-white px-2.5 py-1 rounded-lg text-xs font-bold">{act.pdca || '-'}</span>
              </div>
              {act.schoolCode && (
                <div className="flex justify-between py-2 border-b border-slate-100">
                  <span className="text-slate-500">รหัสสถานศึกษา</span>
                  <span className="font-mono text-slate-700">{act.schoolCode}</span>
                </div>
              )}
            </div>
            <button onClick={onClose} className="mt-6 w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm transition">ปิด</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 🎯 MAIN APP
    // ==========================================
    function App() {
      const [lang, setLang] = useState('th');
      const [role, setRole] = useState('Super Admin');
      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [schoolsDb, setSchoolsDb] = useState(initialSchoolsData);

      // Auth
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [schoolInfo, setSchoolInfo] = useState(null);
      const [loginForm, setLoginForm] = useState({ schoolCode:'', username:'', password:'' });
      const [loginError, setLoginError] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      // Toast
      const [toast, setToast] = useState(null);
      const showToast = (message, type='success') => setToast({ message, type });

      // Activities (Google Sheets)
      const [activities, setActivities] = useState([]);
      const [isLoadingActivities, setIsLoadingActivities] = useState(false);
      const [sheetsError, setSheetsError] = useState('');
      const [selectedAct, setSelectedAct] = useState(null);
      const [confirmModal, setConfirmModal] = useState(null);
      const [searchAct, setSearchAct] = useState('');

      // Activity Form
      const [activityForm, setActivityForm] = useState({ project:'', name:'', budget:'', description:'' });
      const [isSubmittingActivity, setIsSubmittingActivity] = useState(false);
      const [formErrors, setFormErrors] = useState({});

      // Budget Requests
      const [budgetRequests, setBudgetRequests] = useState([
        { id:'REQ-67-001', activity:'อบรมมารยาทไทย', activityId:'ACT-001', amount:5000, date:'10/10/2024', status:'รออนุมัติ (Manager)', note:'' },
        { id:'REQ-67-002', activity:'ปรับปรุงสวนหย่อมหน้าอาคาร', activityId:'ACT-002', amount:25000, date:'05/10/2024', status:'อนุมัติแล้ว', note:'' },
      ]);
      const [budgetForm, setBudgetForm] = useState({ activityId:'', amount:'', note:'' });
      const [showBudgetForm, setShowBudgetForm] = useState(false);
      const [isSubmittingBudget, setIsSubmittingBudget] = useState(false);

      // Settings
      const [settingsTab, setSettingsTab] = useState('general');
      const [settingsForm, setSettingsForm] = useState({ name:'', logo:'', activeMenus:[] });
      const [settingsSuccess, setSettingsSuccess] = useState(false);

      // ----------------------------------------
      // 📡 Google Sheets Integration (JSONP pattern)
      // ----------------------------------------

      /**
       * ดึงข้อมูลจาก Google Sheets ด้วย callback=? (JSONP)
       * GAS ต้อง return: ContentService.createTextOutput(callback + '(' + JSON.stringify(data) + ')').setMimeType(ContentService.MimeType.JAVASCRIPT)
       */
      const loadActivitiesFromSheets = useCallback(async () => {
        if (!GOOGLE_WEB_APP_URL) return;
        setIsLoadingActivities(true);
        setSheetsError('');

        // ลอง fetch ปกติก่อน (ถ้า GAS ตั้ง Access: Anyone)
        try {
          const url = GOOGLE_WEB_APP_URL + '?action=getActivities' + (schoolInfo ? '&schoolCode=' + schoolInfo.id : '');
          const res = await fetch(url, { method:'GET' });
          
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const text = await res.text();

          // รองรับทั้ง plain JSON และ JSONP
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            // JSONP: ลอง strip callback wrapper
            const match = text.match(/\w+\s*\(([\s\S]+)\)\s*;?\s*$/);
            if (match) data = JSON.parse(match[1]);
            else throw new Error('Parse error');
          }

          const list = data.activities || data || [];
          const filtered = schoolInfo
            ? list.filter(a => String(a.schoolCode) === String(schoolInfo.id))
            : list;

          setActivities([...filtered].reverse());
          setSheetsError('');
        } catch (err) {
          console.warn('Sheets fetch failed:', err.message);
          // ถ้า fetch ล้มเหลวให้แสดง error แต่ยังใช้งานส่วนอื่นได้
          setSheetsError('ไม่สามารถดึงข้อมูลจาก Google Sheets ได้ (' + err.message + ')');
        }
        setIsLoadingActivities(false);
      }, [schoolInfo]);

      /**
       * บันทึกข้อมูลลง Google Sheets
       * ใช้ fetch แบบปกติ — GAS ต้องตั้ง doPost ให้ return JSON
       * ถ้า CORS block จะ fallback ไป no-cors (ไม่ได้ response แต่ข้อมูลยังถูกบันทึก)
       */
      const postToSheets = async (payload) => {
        try {
          const res = await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (res.ok) {
            const data = await res.json().catch(() => ({}));
            return { ok: true, data };
          }
          throw new Error('HTTP ' + res.status);
        } catch (corsErr) {
          // Fallback: no-cors (ส่งข้อมูลได้ แต่ไม่ได้ response)
          try {
            await fetch(GOOGLE_WEB_APP_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            return { ok: true, data: {}, noCors: true };
          } catch (e) {
            return { ok: false, error: e.message };
          }
        }
      };

      // ----------------------------------------
      // Auth
      // ----------------------------------------
      useEffect(() => {
        if (isLoggedIn && schoolInfo) loadActivitiesFromSheets();
      }, [isLoggedIn, schoolInfo]);

      useEffect(() => {
        if (schoolInfo) {
          setSettingsForm({ name: schoolInfo.name, logo: schoolInfo.logo || '', activeMenus: [...(schoolInfo.activeMenus || [])] });
        }
      }, [schoolInfo]);

      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoading(true);
        setLoginError('');
        setTimeout(() => {
          if (schoolsDb[loginForm.schoolCode]) {
            setSchoolInfo(schoolsDb[loginForm.schoolCode]);
            setIsLoggedIn(true);
          } else {
            setLoginError('รหัสสถานศึกษาไม่ถูกต้อง (กรุณาลอง 1001 หรือ 1002)');
          }
          setIsLoading(false);
        }, 800);
      };

      const handleLogout = () => {
        setIsLoggedIn(false); setSchoolInfo(null);
        setLoginForm({ schoolCode:'', username:'', password:'' });
        setActiveMenu('dashboard'); setActivities([]);
      };

      // ----------------------------------------
      // Activity CRUD
      // ----------------------------------------
      const validateActivityForm = () => {
        const errs = {};
        if (!activityForm.project) errs.project = 'กรุณาเลือกโครงการหลัก';
        if (!activityForm.name.trim()) errs.name = 'กรุณาระบุชื่อกิจกรรม';
        if (activityForm.budget && isNaN(Number(activityForm.budget))) errs.budget = 'กรุณาระบุตัวเลข';
        return errs;
      };

      const handleProposeActivity = async (e) => {
        e.preventDefault();
        const errs = validateActivityForm();
        if (Object.keys(errs).length > 0) { setFormErrors(errs); return; }
        setFormErrors({});
        setIsSubmittingActivity(true);

        const newAct = {
          id: genId(),
          schoolCode: schoolInfo?.id || '',
          project: activityForm.project,
          name: activityForm.name.trim(),
          description: activityForm.description || '',
          budget: parseFloat(activityForm.budget) || 0,
          status: 'รออนุมัติ QA',
          pdca: 'Plan',
          createdAt: new Date().toLocaleDateString('th-TH'),
        };

        // Optimistic update
        setActivities(prev => [newAct, ...prev]);

        const result = await postToSheets({ action:'addActivity', ...newAct });
        
        if (result.ok) {
          showToast(result.noCors ? 'บันทึกข้อมูลแล้ว (กำลังซิงก์กับ Google Sheets)' : 'บันทึกข้อมูลลง Google Sheets เรียบร้อยแล้ว! 🎉');
          setActivityForm({ project:'', name:'', budget:'', description:'' });
          setActiveMenu('activityMgmt');
          if (!result.noCors) setTimeout(loadActivitiesFromSheets, 1500);
        } else {
          showToast('เกิดข้อผิดพลาด: ' + result.error, 'error');
          setActivities(prev => prev.filter(a => a.id !== newAct.id));
        }
        setIsSubmittingActivity(false);
      };

      // ----------------------------------------
      // Status Updates (QA / Director / Manager)
      // ----------------------------------------
      const handleStatusUpdate = async (id, newStatus, source='') => {
        const prev = activities.find(a => a.id === id);
        setActivities(acts => acts.map(a => a.id === id ? {...a, status: newStatus} : a));
        
        const result = await postToSheets({ action:'updateStatus', id, status: newStatus, updatedBy: role });
        if (result.ok) {
          const labels = { 'รออนุมัติ ผอ.':'ผ่าน QA แล้ว ✅', 'กำลังดำเนินการ':'ผอ. อนุมัติแล้ว ✅', 'อนุมัติแล้ว':'Manager อนุมัติแล้ว ✅', 'ตีกลับ':'ตีกลับเรียบร้อย', 'ไม่อนุมัติ':'ไม่อนุมัติเรียบร้อย' };
          showToast(labels[newStatus] || 'อัปเดตสถานะเรียบร้อยแล้ว');
        } else {
          setActivities(acts => acts.map(a => a.id === id ? {...a, status: prev.status} : a));

                                      <div className="flex items-center gap-3">
                                        <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${isActive?'bg-brand-primary text-white':'bg-slate-100 text-slate-400'}`}>
                                          <i className={menu.icon+' text-sm'}></i>
                                        </div>
                                        <div>
                                          <p className={`font-semibold text-xs ${isActive?'text-slate-800':'text-slate-500'}`}>{menu.label}</p>
                                          <p className="text-xs text-slate-400">{isLocked?'จำเป็น':'เปิด/ปิดเมนูนี้'}</p>
                                        </div>
                                      </div>
                                      <div className={`w-10 h-5 rounded-full relative transition-colors ${isActive?'bg-emerald-500':'bg-slate-300'}`}>
                                        <div className={`w-3.5 h-3.5 rounded-full bg-white absolute top-0.5 transition-all shadow ${isActive?'left-5.5 translate-x-0.5':'left-0.5'}`} style={{left:isActive?'calc(100% - 18px)':'2px'}}></div>
                                      </div>
                                      {!isLocked && <input type="checkbox" className="hidden" checked={isActive} onChange={()=>handleToggleMenu(menu.id)} />}
                                    </label>
                                  );
                                })}
                              </div>
                            </div>
                          )}

                          {settingsTab === 'sheets' && (
                            <div className="space-y-5">
                              <h4 className="text-base font-bold text-slate-800 border-b border-slate-100 pb-3 mb-5">การเชื่อมต่อ Google Sheets</h4>
                              <div className={`rounded-xl p-4 flex items-start gap-3 text-sm ${sheetsError?'bg-rose-50 border border-rose-200 text-rose-700':'bg-emerald-50 border border-emerald-200 text-emerald-700'}`}>
                                <i className={`fa-solid ${sheetsError?'fa-circle-xmark':'fa-circle-check'} text-lg mt-0.5`}></i>
                                <div>
                                  <p className="font-semibold">{sheetsError?'การเชื่อมต่อมีปัญหา':'เชื่อมต่อสำเร็จ'}</p>
                                  <p className="opacity-75 mt-0.5 text-xs">{sheetsError||'สามารถรับ-ส่งข้อมูลกับ Google Sheets ได้'}</p>
                                </div>
                              </div>
                              <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Google Apps Script URL</label>
                                <div className="flex gap-2">
                                  <input type="text" readOnly value={GOOGLE_WEB_APP_URL}
                                    className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-xs font-mono outline-none bg-slate-50 text-slate-500" />
                                  <button type="button" onClick={()=>{navigator.clipboard.writeText(GOOGLE_WEB_APP_URL);showToast('คัดลอก URL แล้ว','info');}}
                                    className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-600 font-semibold text-sm transition">
                                    <i className="fa-solid fa-copy"></i>
                                  </button>
                                </div>
                              </div>
                              <button type="button" onClick={loadActivitiesFromSheets}
                                className="flex items-center gap-2 bg-brand-primary text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition shadow-lg shadow-brand-primary/30">
                                <i className={`fa-solid fa-rotate-right ${isLoadingActivities?'fa-spin':''}`}></i>
                                ทดสอบการเชื่อมต่อ
                              </button>
                              <div className="bg-slate-50 rounded-xl p-4 text-xs text-slate-500 space-y-2 border border-slate-200">
                                <p className="font-semibold text-slate-700">📋 Google Apps Script ต้องรองรับ:</p>
                                <p>• <code className="bg-slate-200 px-1 rounded">doGet(e)</code> → return JSON array of activities</p>
                                <p>• <code className="bg-slate-200 px-1 rounded">doPost(e)</code> → รับ action: addActivity / updateStatus / addBudgetRequest / updateBudgetStatus</p>
                                <p>• ตั้งค่า Deploy → Execute as: Me, Who has access: Anyone</p>
                              </div>
                            </div>
                          )}

                          {settingsTab !== 'sheets' && (
                            <div className="mt-8 pt-5 border-t border-slate-100">
                              <button type="submit" className="bg-brand-primary hover:bg-indigo-700 text-white font-semibold py-2.5 px-7 rounded-xl transition shadow-lg shadow-brand-primary/30 flex items-center gap-2 text-sm">
                                <i className="fa-solid fa-save"></i> บันทึกการตั้งค่า
                              </button>
                            </div>
                          )}
                        </form>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
