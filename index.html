    function App() {

            logo: schoolInfo.logo || '',

        setLang(lang === 'th' ? 'en' : 'th');

      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoading(true);
        setLoginError('');

        // ตรวจสอบข้อมูลจาก Mock Database (Local)
        setTimeout(() => {
          if (schoolsDb[loginForm.schoolCode]) {
            setSchoolInfo(schoolsDb[loginForm.schoolCode]);
            setIsLoggedIn(true);
          } else {
            setLoginError(t.invalidLogin);
          }
          setIsLoading(false);
        }, 800);
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setSchoolInfo(null);
        setLoginForm({ schoolCode: '', username: '', password: '' });
        setActiveMenu('dashboard');
      };

      // ฟังก์ชันเมื่อกดปุ่ม "บันทึกข้อมูล" กิจกรรม -> ส่งไป Google Sheets
      const handleProposeActivity = async (e) => {
        e.preventDefault();
        
        if (!activityForm.project || !activityForm.name) {
          alert('กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน');
          return;
        }

        if (GOOGLE_WEB_APP_URL === 'นำลิงก์_Web_App_ที่ลงท้ายด้วย_exec_มาวางตรงนี้') {
          alert('⚠️ คุณยังไม่ได้ใส่ URL ของ Google Apps Script ที่ลงท้ายด้วย /exec โค้ดจะจำลองการทำงานเฉยๆ นะครับ');
          setActivityForm({ project: '', name: '', budget: '' }); 
          setActiveMenu('activityMgmt');
          return;
        }

        setIsSubmittingActivity(true);

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // ใช้โหมดนี้เพื่อเลี่ยงปัญหา Browser CORS Block
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              schoolCode: schoolInfo.id,
              project: activityForm.project,
              name: activityForm.name,
              budget: activityForm.budget || 0,
              status: 'รออนุมัติ QA',
              pdca: 'Plan'
            })
          });

          alert('บันทึกข้อมูลกิจกรรมลง Google Sheets เรียบร้อยแล้ว! 🎉');
          setActivityForm({ project: '', name: '', budget: '' }); 
          setActiveMenu('activityMgmt');

        } catch (error) {
          console.error('Error saving:', error);
          alert('ส่งข้อมูลสำเร็จ (แต่อาจจะติดหน้าจอโหลด ให้ไปเช็คใน Google Sheets)');
        }
        
        setIsSubmittingActivity(false);

            return { ...prev, activeMenus: prev.activeMenus.filter(id => id !== menuId) };

                        </form>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
